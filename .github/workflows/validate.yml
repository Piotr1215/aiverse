name: Validate

on:
  pull_request:
    paths:
      - '.claude-plugin/**'
      - 'plugins/**'
      - 'schema/**'
      - 'scripts/**'
      - 'package*.json'
      - '**/*.md'
  push:
    branches: [main]
    paths:
      - '.claude-plugin/**'
      - 'plugins/**'
      - 'schema/**'
      - 'scripts/**'
      - 'package*.json'
      - '**/*.md'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run validate
      - run: npm run lint:md
